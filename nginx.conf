server {
	listen 80;
	server_name _;
	root /usr/share/nginx/html;
	index index.html;

	# Compression des réponses texte
	gzip on;
	gzip_vary on;
	gzip_min_length 1024;
	gzip_types text/plain text/css application/javascript application/json image/svg+xml;

	# Assets hashés par Vite → immuables, cache long
	location /_app/immutable/ {
		expires 1y;
		add_header Cache-Control "public, immutable";
		access_log off;
	}

	# Le site utilise trailingSlash 'always' : chaque route est un dossier
	# contenant index.html. On sert le fichier, sinon l'index du dossier,
	# et à défaut une vraie 404.
	location / {
		try_files $uri $uri/index.html $uri/ =404;
	}
}
